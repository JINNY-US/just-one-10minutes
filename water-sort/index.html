<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Sort - JUST ONE 10 MINUTES</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container">
        <div class="header">
            <div id="score">Stage: 1</div>
        </div>

        <div id="game-area">
            <div id="bottles-container">
                <!-- 병들이 여기에 생성됩니다 -->
            </div>
        </div>

        <div class="controls">
            <button id="reset-btn">스테이지 재시작</button>
            <a href="../index.html" class="home-btn">홈으로</a>
        </div>

        <div id="message" class="message"></div>

        <div id="start-overlay">
            <div class="overlay-content" style="text-align: center; padding: 20px;">
                <h2 style="font-size: 2.5rem; margin-bottom: 25px;">Color Sort</h2>
                <button id="start-btn" style="padding: 15px 50px; font-size: 1.5rem; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">게임 시작</button>
            </div>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
