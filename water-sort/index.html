<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Water Sort - JUST ONE 10 MINUTES</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container">
        <div class="header">
            <a href="../index.html" class="home-btn">홈으로</a>
            <div id="score">Stage: 1</div>
        </div>

        <div id="game-area">
            <div id="bottles-container">
                <!-- 병들이 여기에 생성됩니다 -->
            </div>
        </div>

        <div class="controls">
            <button id="reset-btn">스테이지 재시작</button>
        </div>

        <div id="message" class="message"></div>

        <div id="start-overlay">
            <div class="overlay-content" style="text-align: center; padding: 20px;">
                <h2 style="font-size: 2rem; margin-bottom: 15px;">Color Water Sort</h2>
                <p style="margin-bottom: 10px;">같은 색상의 액체를 한 병에 모으세요!</p>
                <div style="font-size: 0.9rem; margin-top: 15px; color: #666; background: #f0f0f0; padding: 15px; border-radius: 10px; line-height: 1.6;">
                    <strong>[게임 방법]</strong><br>
                    1. 병을 선택하면 위로 올라옵니다.<br>
                    2. 액체를 옮길 다른 병을 선택하세요.<br>
                    3. <span style="color: #e74c3c; font-weight: bold;">같은 색상 위</span> 또는 <span style="color: #3498db; font-weight: bold;">빈 병</span>에만 부을 수 있습니다.<br>
                    4. 한 병이 한 가지 색으로 가득 차면 완성!
                </div>
                <button id="start-btn" style="margin-top: 20px; padding: 15px 40px; font-size: 1.2rem; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer;">게임 시작</button>
            </div>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
