<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Sort - JUST ONE 10 MINUTES</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container">
        <h1>COLOR SORT</h1>
        
        <div id="board-container">
            <div class="header">
                <div id="score">Stage: 1</div>
            </div>

            <div id="game-area">
                <div id="bottles-container">
                    <!-- 병들이 여기에 생성됩니다 -->
                </div>
            </div>

            <!-- 시작 버튼 오버레이 -->
            <div id="start-overlay">
                <button id="start-btn" class="btn btn-accent" style="padding: 15px 70px; font-size: 1.5rem; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">게임 시작</button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="controls">
            <button id="reset-btn" class="btn btn-primary">스테이지 재시작</button>
            <a href="../index.html" class="home-btn">홈으로</a>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
