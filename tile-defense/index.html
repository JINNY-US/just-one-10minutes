<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Defense - JUST ONE 10 MINUTES</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="dark-toggle">
    <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
    </label>
</div>

<div class="game-container">
    <h1>Tile Defense</h1>
    <div id="ui-header">
        <div class="stat-item">SP: <span id="sp-val">100</span></div>
        <div class="stat-item">비용: <span id="cost-val">10</span></div>
        <div class="stat-item">LIFE: <span id="hp-val">10</span></div>
        <div class="stat-item">WAVE: <span id="wave-val">1</span></div>
    </div>

    <div id="board-container">
        <div id="grid"></div>
        <canvas id="game-canvas" width="600" height="400"></canvas>
        
        <!-- 타일 강화 UI -->
        <div id="upgrade-panel">
            <div class="upgrade-item" data-type="fire">
                <div class="upgrade-icon type-fire">🔥</div>
                <div class="upgrade-level">Lv.1</div>
                <button class="upgrade-btn">100 SP</button>
            </div>
            <div class="upgrade-item" data-type="electric">
                <div class="upgrade-icon type-electric">⚡</div>
                <div class="upgrade-level">Lv.1</div>
                <button class="upgrade-btn">100 SP</button>
            </div>
            <div class="upgrade-item" data-type="wind">
                <div class="upgrade-icon type-wind">💨</div>
                <div class="upgrade-level">Lv.1</div>
                <button class="upgrade-btn">100 SP</button>
            </div>
            <div class="upgrade-item" data-type="poison">
                <div class="upgrade-icon type-poison">🧪</div>
                <div class="upgrade-level">Lv.1</div>
                <button class="upgrade-btn">100 SP</button>
            </div>
            <div class="upgrade-item" data-type="ice">
                <div class="upgrade-icon type-ice">❄️</div>
                <div class="upgrade-level">Lv.1</div>
                <button class="upgrade-btn">100 SP</button>
            </div>
        </div>

        <div id="start-overlay">
            <div class="start-desc">타일을 드래그하여 합성하고 웨이브를 막아내세요!</div>
            <button id="real-start-btn" class="btn btn-accent">게임 시작하기</button>
        </div>
    </div>

    <div id="controls">
        <button id="summon-btn" class="btn btn-primary">타일 소환</button>
        <a href="../index.html" class="home-btn">돌아가기</a>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
