<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOMATO TILE - 합이 10인 토마토 찾기</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container">
        <h1>TOMATO TILE</h1>
        
        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>

        <div id="board-container">
            <div id="game-board" class="game-board"></div>
            <div id="selection-box" class="selection-box hidden"></div>
            <div id="start-overlay">
                <button id="start-btn" class="btn btn-accent">시작하기</button>
            </div>
        </div>

        <div id="score">Score: 0</div>

        <div class="controls">
            <button id="reset-btn" class="btn btn-primary">다시하기</button>
            <a href="../index.html" class="home-btn">돌아가기</a>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
