<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOMATO TILE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>
    <div class="game-container">
        <h1>TOMATO TILE</h1>
        
        <div class="timer-wrapper">
            <div id="timer-bar" class="timer-bar"></div>
        </div>

        <div class="board-wrapper">
            <div id="game-board" class="game-board"></div>
            <div id="selection-box" class="selection-box hidden"></div>
            <!-- 시작 버튼을 보드 안으로 이동 -->
            <div id="start-overlay" class="start-overlay">
                <button id="start-btn" class="btn btn-start">게임 시작</button>
            </div>
        </div>

        <div class="footer">
            <div class="score-board">현재 점수: <span id="score">0</span></div>
            <div class="bottom-menu">
                <button id="reset-btn" class="btn">다시 하기</button>
                <a href="../index.html" class="btn btn-back">돌아가기</a>
            </div>
        </div>

        <div id="overlay" class="overlay hidden">
            <div class="result-modal">
                <h2>게임 종료!</h2>
                <div class="final-score-text">최종 점수: <span id="final-score">0</span>점</div>
                <button onclick="resetGame()" class="btn btn-large">한 판 더!</button>
            </div>
        </div>
    </div>
    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
