<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROGUE SURVIVOR - Roguelike Auto-Shooter</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container full-width">
        <h1>ROGUE SURVIVOR</h1>
        
        <div class="hud">
            <div class="hud-top">
                <div class="hp-bar-container">
                    <div id="hp-bar" class="hp-bar"></div>
                    <span id="hp-text">HP: 100/100</span>
                </div>
                <div class="timer-display">TIME: <span id="game-timer">00:00</span></div>
            </div>
            <div class="xp-bar-container">
                <div id="xp-bar" class="xp-bar"></div>
            </div>
            <div class="hud-bottom">
                <div class="stats">LEVEL: <span id="level-val">1</span> | KILL: <span id="kill-val">0</span></div>
                <div class="gold-display">💰 <span id="gold-val">0</span></div>
            </div>
        </div>

        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="start-overlay">
                <div class="menu-content">
                    <p>방향키로 이동하세요 (자동 공격)</p>
                    <button id="start-btn" class="btn btn-accent">시작하기</button>
                </div>
            </div>
            
            <!-- 레벨업 오버레이 -->
            <div id="levelup-overlay" class="overlay hidden">
                <div class="upgrade-modal">
                    <h2>LEVEL UP!</h2>
                    <p>강화할 스킬을 선택하세요</p>
                    <div id="upgrade-list" class="upgrade-list"></div>
                </div>
            </div>

            <!-- 상점 오버레이 -->
            <div id="shop-overlay" class="overlay hidden">
                <div class="shop-modal">
                    <h2>ITEM SHOP</h2>
                    <p>골드로 아이템을 구매하세요</p>
                    <div id="shop-list" class="shop-list"></div>
                    <button id="close-shop-btn" class="btn btn-primary">사냥 계속하기</button>
                </div>
            </div>
        </div>

        <div class="controls" style="margin-top: 15px;">
            <a href="../index.html" class="home-btn">돌아가기</a>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
