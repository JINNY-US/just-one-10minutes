<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TILE SURVIVOR - Roguelike Auto-Shooter</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container full-width">
        <h1>TILE SURVIVOR</h1>
        
        <div class="hud">
            <!-- 경험치 바 (네모 모양, 레벨 텍스트 포함) -->
            <div class="xp-bar-container square">
                <div id="xp-bar" class="xp-bar"></div>
                <div id="level-display">LEVEL 1</div>
            </div>
        </div>

        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="start-overlay">
                <div class="menu-content">
                    <p>WASD 키로 이동하세요</p>
                    <p style="font-size: 0.8rem; color: #888;">공격은 자동으로 이루어집니다</p>
                    <button id="start-btn" class="btn btn-accent">시작하기</button>
                </div>
            </div>
            
            <div id="levelup-overlay" class="overlay hidden">
                <div class="upgrade-modal">
                    <h2>LEVEL UP!</h2>
                    <p>강화할 스킬을 선택하세요</p>
                    <div id="upgrade-list" class="upgrade-list"></div>
                </div>
            </div>
        </div>

        <!-- 보드 밑 점수판 -->
        <div id="score-board" class="score-board">
            Score: <span id="score-val">0</span>
        </div>

        <div class="controls">
            <button id="reset-btn" class="btn btn-primary">다시하기</button>
            <a href="../index.html" class="home-btn">돌아가기</a>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
