<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Maze - 무한 이동 미로</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container">
        <h1>TILE MAZE</h1>
        
        <!-- 1. 게임 보드 영역 -->
        <div id="board-container">
            <div id="game-board"></div>
            
            <!-- 시작 오버레이 (보드 위에 겹침) -->
            <div id="start-overlay">
                <button id="start-btn" class="btn btn-accent">시작하기</button>
            </div>

            <!-- 게임 오버 오버레이 -->
            <div id="game-over-overlay" class="hidden">
                <h2 id="game-over-title">GAME OVER</h2>
                <p id="final-score">Score: 0</p>
                <button id="restart-btn" class="btn btn-accent">다시 도전</button>
            </div>
        </div>

        <!-- 2. 점수판 (보드 아래) -->
        <div id="score-container">
            <div id="score">Score: 0</div>
        </div>

        <!-- 3. 컨트롤 버튼 (점수판 아래) -->
        <div class="controls">
            <button id="reset-button" class="btn btn-primary">다시하기</button>
            <a href="../index.html" class="home-btn">돌아가기</a>
        </div>

        <!-- 4. 게임 설명 (맨 아래) -->
        <div class="instructions">
            <p>방향키로 이동합니다. 무한 루프에 갇히지 않게 조심하세요!</p>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
