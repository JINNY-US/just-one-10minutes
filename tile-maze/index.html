<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Maze - 무한 이동 미로</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container">
        <h1>TILE MAZE</h1>
        
        <div id="score-container">
            <div id="score">Score: 0</div>
            <div id="best-score">Best: 0</div>
        </div>

        <div id="board-container">
            <div id="game-board"></div>
            <div id="start-overlay">
                <div class="instructions">
                    <p>방향키로 이동하세요!</p>
                    <p>화살표를 밟으면 해당 방향으로 자동 이동합니다.</p>
                    <p>무한 루프나 벽에 부딪히면 종료!</p>
                </div>
                <button id="start-btn" class="btn btn-accent">시작하기</button>
            </div>
            <div id="game-over-overlay" class="hidden">
                <h2 id="game-over-title">GAME OVER</h2>
                <p id="final-score">Score: 0</p>
                <button id="restart-btn" class="btn btn-accent">다시 도전</button>
            </div>
        </div>

        <div class="controls">
            <a href="../index.html" class="home-btn">돌아가기</a>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
