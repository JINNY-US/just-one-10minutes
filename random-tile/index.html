<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Tile - JUST ONE 10 MINUTES</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="dark-toggle">
    <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
    </label>
</div>

<div class="game-container">
    <h1>Random Tile</h1>
    <div id="ui-header">
        <div class="stat-item">GOLD: <span id="gold-val">0</span></div>
        <div class="stat-item">SP: <span id="sp-val">100</span></div>
        <div class="stat-item">비용: <span id="cost-val">10</span></div>
        <div class="stat-item">LIFE: <span id="hp-val">10</span></div>
        <div class="stat-item">WAVE: <span id="wave-val">1</span></div>
    </div>

    <div id="board-container">
        <div id="grid"></div>
        <canvas id="game-canvas" width="600" height="400"></canvas>
        
        <div id="start-overlay">
            <div class="start-desc">타일을 드래그하여 합성하고 웨이브를 막아내세요!</div>
            <button id="real-start-btn" class="btn btn-accent">게임 시작하기</button>
        </div>
    </div>

    <!-- 상점 모달 -->
    <div id="shop-modal" class="modal">
        <div class="modal-content">
            <h2>타일 상점</h2>
            <div id="shop-items">
                <!-- 상점 아이템이 여기에 동적으로 생성됨 -->
            </div>
            <button class="btn btn-close" onclick="closeModal('shop-modal')">닫기</button>
        </div>
    </div>

    <!-- 인벤토리 모달 -->
    <div id="inventory-modal" class="modal">
        <div class="modal-content">
            <h2>인벤토리</h2>
            <div id="inventory-items">
                <!-- 인벤토리 아이템이 여기에 동적으로 생성됨 -->
            </div>
            <button class="btn btn-close" onclick="closeModal('inventory-modal')">닫기</button>
        </div>
    </div>

    <!-- 타일 강화 UI를 보드 바깥으로 이동 -->
    <div id="upgrade-panel">
        <!-- ... existing upgrade items ... -->
    </div>

    <div id="controls">
        <button id="summon-btn" class="btn btn-primary">타일 소환</button>
        <button id="shop-btn" class="btn btn-warning">타일 상점</button>
        <button id="inventory-btn" class="btn btn-info">인벤토리</button>
        <a href="../index.html" class="home-btn">돌아가기</a>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
