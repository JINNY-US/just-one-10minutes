<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DICE DEFENSE - JUST ONE 10 MINUTES</title>
    <link rel="stylesheet" href="../common-game.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dark-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="game-container">
        <h1>DICE DEFENSE</h1>
        
        <div class="info-bar">
            <div id="sp-display" class="info-item">
                <span class="icon">✨</span>
                SP: <span id="sp-value">100</span>
            </div>
            <div id="wave-display" class="info-item">
                <span class="icon">🌊</span>
                Wave: <span id="wave-value">0</span>
            </div>
            <div id="hp-display" class="info-item">
                <span class="icon">❤️</span>
                HP: <span id="hp-value">20</span>
            </div>
            <div id="game-level-display" class="info-item">
                <span class="icon">⭐</span>
                Lv: <span id="game-level-value">1</span>
            </div>
        </div>

        <div id="game-area">
            <div id="game-board"></div>
            <canvas id="game-canvas"></canvas>
        </div>

        <div class="controls">
            <button id="summon-dice-btn" class="btn btn-accent">
                주사위 소환 (<span id="summon-cost">10</span>SP)
            </button>
            <button id="level-up-game-btn" class="btn btn-primary">
                레벨업 (<span id="level-up-cost">100</span>SP)
            </button>
            <a href="../index.html" class="home-btn">홈으로</a>
        </div>
        
        <div id="message-area" class="message"></div>

        <div id="start-overlay" class="game-overlay">
            <div class="overlay-content">
                <h2>DICE DEFENSE</h2>
                <p>무작위 주사위를 조합하여 몰려오는 적을 막으세요!</p>
                <button id="start-game-btn" class="btn btn-accent">게임 시작</button>
            </div>
        </div>

        <div id="game-over-overlay" class="game-overlay" style="display: none;">
            <div class="overlay-content">
                <h2>GAME OVER</h2>
                <p id="final-score"></p>
                <button id="restart-game-btn" class="btn btn-accent">재시작</button>
            </div>
        </div>
    </div>

    <script src="../common-game.js"></script>
    <script src="script.js"></script>
</body>
</html>
