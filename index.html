<!-- Deployment Refresh -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUST ONE 10 MINUTES - 미니게임 포털</title>
    <link rel="stylesheet" href="main.css">
    <!-- Google Fonts 추가 (선택 사항) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="header-content">
                <span class="logo-emoji">🎮</span>
                <h1>JUST ONE 10 MINUTES</h1>
            </div>
        </header>

        <main class="container">
            <section class="game-section">
                <h2 class="section-title">플레이할 게임을 선택하세요</h2>
                <div class="game-list">
                    <!-- Color Tiles 게임 -->
                    <a href="color-tiles/index.html" class="game-card">
                        <div class="card-inner">
                            <div class="game-icon">🎨</div>
                            <div class="game-info">
                                <h3>Color Tiles</h3>
                                <p>색이 다른 타일을 찾아보세요!</p>
                            </div>
                            <span class="play-badge">PLAY</span>
                        </div>
                    </a>

                    <!-- Tile Memory 게임 -->
                    <a href="tile-memory/index.html" class="game-card">
                        <div class="card-inner">
                            <div class="game-icon">🧩</div>
                            <div class="game-info">
                                <h3>Tile Memory</h3>
                                <p>반짝이는 순서를 완벽하게 기억하세요!</p>
                            </div>
                            <span class="play-badge">PLAY</span>
                        </div>
                    </a>

                    <!-- Number 100 게임 -->
                    <a href="number-100/index.html" class="game-card">
                        <div class="card-inner">
                            <div class="game-icon">🔢</div>
                            <div class="game-info">
                                <h3>Number 100</h3>
                                <p>숫자들을 합쳐 정확히 100을 만드세요!</p>
                            </div>
                            <span class="play-badge">PLAY</span>
                        </div>
                    </a>

                    <!-- 추가 예정 게임 -->
                    <div class="game-card disabled">
                        <div class="card-inner">
                            <div class="game-icon">🕒</div>
                            <div class="game-info">
                                <h3>Coming Soon</h3>
                                <p>새로운 게임이 곧 추가됩니다!</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <p>© 2026 JUST ONE 10 MINUTES. All rights reserved.</p>
            </div>
        </footer>
    </div>
</body>
</html>
