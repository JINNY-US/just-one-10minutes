<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Hub - 다양한 웹 게임</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 JUST ONE 10 MINUTES</h1>
            <p>다양한 간단한 웹 게임들을 즐겨보세요!</p>
        </header>

        <main class="game-list">
            <!-- Color Tiles 게임 -->
            <a href="color-tiles/index.html" class="game-card">
                <div class="game-icon">🎨</div>
                <div class="game-info">
                    <h2>Color Tiles</h2>
                    <p>다른 색상의 타일을 찾아보세요!</p>
                </div>
            </a>

            <!-- Tile Memory 게임 -->
            <a href="tile-memory/index.html" class="game-card">
                <div class="game-icon">🧩</div>
                <div class="game-info">
                    <h2>Tile Memory</h2>
                    <p>타일이 깜빡이는 순서를 기억하세요!</p>
                </div>
            </a>

            <!-- 추가 예정 게임 (예시) -->
            <div class="game-card disabled">
                <div class="game-icon">🕒</div>
                <div class="game-info">
                    <h2>Coming Soon</h2>
                    <p>새로운 게임이 곧 추가됩니다!</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 My Game Hub. Built with Gemini CLI.</p>
        </footer>
    </div>
</body>
</html>
